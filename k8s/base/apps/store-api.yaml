# StoreApi — Product catalog REST API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-api
  labels:
    app: store-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-api
  template:
    metadata:
      labels:
        app: store-api
    spec:
      containers:
        - name: store-api
          image: order-system/store-api:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5116
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: "http://+:5116"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: STORE_API_CONN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /swagger/index.html
              port: 5116
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /swagger/index.html
              port: 5116
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: store-api
  labels:
    app: store-api
spec:
  selector:
    app: store-api
  ports:
    - port: 5116
      targetPort: 5116
